name: Deploy to GitHub Pages Securely

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🟢 CTO 暴力通管升級：直接鎖定變數宣告的前綴，無視引號與大括號，直接強行複寫整行！
      - name: Inject Secrets into Code
        run: |
          sed -i "s|const BACKEND_URL =.*|const BACKEND_URL = '${{ secrets.BACKEND_URL }}';|g" main.js
          sed -i "s|const LIFF_ID =.*|const LIFF_ID = '${{ secrets.LIFF_ID }}';|g" main.js
          sed -i "s|const GS_API_URL =.*|const GS_API_URL = '${{ secrets.GS_API_URL }}';|g" main.js
          
          echo "=== 🛡️ 雲端核心資安校驗日誌 ==="
          grep -E "GS_API_URL|LIFF_ID|BACKEND_URL" main.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
